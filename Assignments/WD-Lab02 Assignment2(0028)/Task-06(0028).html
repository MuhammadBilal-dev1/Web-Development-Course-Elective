<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 02 - Task 6</title>
    <style>
      .box {
        border: 1px solid #999;
        padding: 20px;
        margin: 10px;
        background-color: white;
      }
      .outer {
        width: 80%;
        margin: auto;
        border: 2px solid #333;
      }
      .inner {
        margin-left: 40px;
      }
      h3 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h3>Task-6: Create a web page that display the below table</h3>

    <div class="box outer">
      &lt;html&gt;

      <div class="box inner">
        &lt;head&gt;
        <div class="box inner" style="text-align: center">
          &lt;title&gt; This Is Your Title &lt;/title&gt;
        </div>
        &lt;/head&gt;
      </div>

      <div class="box inner">
        &lt;body&gt;
        <div
          class="box inner"
          style="
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
          "
        >
          <strong>&lt;h1&gt; This Is Your Header &lt;/h1&gt;</strong>
          <strong>&lt;p&gt; This is your paragraph. &lt;/p&gt;</strong>
        </div>
        &lt;/body&gt;
      </div>

      &lt;/html&gt;
    </div>
  </body>
</html>
