<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 02 - Task 14</title>
  <link rel="stylesheet" href="./Task-14(0028).css">
</head>
<body>
  <div class="cart-container">
    <div class="cart-header">
        <span>🛒 My Cart</span>
        <span class="close-x">×</span>
    </div>

    <table class="cart-table">
        <tr>
            <td><img src="https://via.placeholder.com/40" alt="p1"></td>
            <td class="product-name">product 1</td>
            <td class="price">$10</td>
            <td><input type="number" value="2" class="qty-input"></td>
            <td class="total">$20</td>
            <td><button class="remove-btn">x</button></td>
        </tr>
        <tr>
            <td><img src="https://via.placeholder.com/40" alt="p3"></td>
            <td class="product-name">product 3</td>
            <td class="price">$30</td>
            <td><input type="number" value="6" class="qty-input"></td>
            <td class="total">$180</td>
            <td><button class="remove-btn">x</button></td>
        </tr>
        <tr>
            <td><img src="https://via.placeholder.com/40" alt="p4"></td>
            <td class="product-name">product 4</td>
            <td class="price">$40</td>
            <td><input type="number" value="1" class="qty-input"></td>
            <td class="total">$40</td>
            <td><button class="remove-btn">x</button></td>
        </tr>
        
        <tr class="summary-row">
            <td colspan="4" class="text-bold">Total</td>
            <td colspan="2" class="text-bold">$240</td>
        </tr>
        <tr class="summary-row discount">
            <td colspan="4" class="text-bold">Total (including discount)</td>
            <td colspan="2" class="text-bold">$120</td>
        </tr>
    </table>

    <div class="cart-footer">
        <button class="btn-close">Close</button>
        <button class="btn-checkout">Checkout</button>
    </div>
</div>
</body>
</html>
