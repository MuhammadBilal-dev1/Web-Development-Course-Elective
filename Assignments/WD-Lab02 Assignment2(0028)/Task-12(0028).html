<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 02 - Task 12</title>
  <link rel="stylesheet" href="./Task-12(0028).css">
</head>
<body>
  <div class="page-wrapper">
    <div class="header-section">
        <h1>Connect With Us</h1>
        <p>We would love to respond to your queries and help you succeed.<br>
           Feel free to get in touch with us.</p>
    </div>

    <div class="contact-card">
        <div class="form-side">
            <h3>Send your request</h3>
            <form>
                <div class="input-grid">
                    <div class="field">
                        <label>Name</label>
                        <input type="text" placeholder="John Amendo">
                    </div>
                    <div class="field">
                        <label>Phone</label>
                        <input type="text" placeholder="+1 412 520 3231">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" placeholder="johnamendogm@gmail.com">
                    </div>
                    <div class="field">
                        <label>Subject</label>
                        <input type="text" placeholder="Product Demo">
                    </div>
                </div>
                <div class="field">
                    <label>Message</label>
                    <textarea placeholder="Your Message"></textarea>
                </div>
                <button type="submit" class="send-btn">SEND</button>
            </form>
        </div>

        <div class="info-side">
            <h3>Reach Us</h3>
            <div class="info-item">
                <span>Email</span>
                <p>contactus@example.com</p>
            </div>
            <div class="info-item">
                <span>Phone</span>
                <p>+1 012 345 6789</p>
            </div>
            <div class="info-item">
                <span>Address</span>
                <p>#212, Ground floor, 7th cross<br>
                   Some layout, Some Road,<br>
                   Koromangla<br>
                   Bengaluru 560001</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
